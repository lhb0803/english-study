name: Weekly Picks

on:
  schedule:
    # Sunday 21:00 UTC = Monday 06:00 KST
    - cron: "0 21 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Build picks
        run: npm run picks:build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GCP_TTS_KEY: ${{ secrets.GCP_TTS_KEY }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      - name: Commit updated picks
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: weekly picks"
          file_pattern: "public/picks/*.json data/article-cache.json data/audio-cache.json"
